server:
  port: 8080
  timeouts:
    read_header: 5s
    read: 10s
    write: 15s
    idle: 60s
  cors:
    allowed_origins:
      - "http://localhost:3000"
      - "http://localhost:5173"
    allow_credentials: true
    max_age: 12h

logger:
  level: "info"
  format: "json"
  output_path: "logs/app/gateway.log"

auth_grpc:
  address: "auth-service:9090"
  request_timeout: 5s

user_grpc:
  address: "user-service:9091"
  request_timeout: 5s

movie_grpc:
  address: "movie-service:9092"
  request_timeout: 5s

user_auth:
  refresh_cookie_name: "refresh_token"
  refresh_token_ttl: "336h"
  cookie_secure: false

s3:
  internal_endpoint: "minio:9000"
  public_endpoint: "localhost:9000"
  region: "ru-msk"
  access_key_id: "minioadmin"
  secret_access_key: "minioadmin"
  bucket_support: "vkino-support"
  use_ssl: false
  use_path_style: true
  presign_ttl: "15m"
