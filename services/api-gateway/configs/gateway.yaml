server:
  port: 8080
  timeouts:
    read_header: 5s
    read: 10s
    write: 15s
    idle: 60s
  cors:
    allowed_origins:
      - "http://localhost:3000"
      - "http://localhost:5173"
    allow_credentials: true
    max_age: 12h

logger:
  level: "info"
  format: "json"
  output_path: "logs/app/gateway.log"

auth_grpc:
  address: "auth-service:9090"
  request_timeout: 5s

user_grpc:
  address: "user-service:9091"
  request_timeout: 5s

legacy_api:
  base_url: "http://vkinoapi:8080"

user_auth:
  refresh_cookie_name: "refresh_token"
  refresh_token_ttl: "336h"
  cookie_secure: false
