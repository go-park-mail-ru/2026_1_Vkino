grpc:
  port: 9090

logger:
  level: "info"
  format: "json"
  output_path: "logs/app/auth-service.log"

auth:
  jwt_secret: "dev-secret"
  access_token_ttl: "15m"
  refresh_token_ttl: "336h"
  issuer: "vkino-auth-service"

postgres:
  host: "db"
  port: 5432
  user: "vkino_user"
  password: "vkino"
  dbname: "vkino"
  sslmode: "disable"
  max_pool_size: 10
  conn_attempts: 10
  conn_timeout: "5s"