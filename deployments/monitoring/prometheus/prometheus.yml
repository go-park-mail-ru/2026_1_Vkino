global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "api-gateway"
    static_configs:
      - targets: ["api-gateway:9200"]

  - job_name: "auth-service"
    static_configs:
      - targets: ["auth-service:9200"]

  - job_name: "user-service"
    static_configs:
      - targets: ["user-service:9200"]

  - job_name: "movie-service"
    static_configs:
      - targets: ["movie-service:9200"]

  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: "cadvisor"
    static_configs:
      - targets: ["cadvisor:8080"]

  - job_name: "prometheus"
    static_configs:
      - targets: ["prometheus:9090"]
