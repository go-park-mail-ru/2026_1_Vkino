services:
  nginx:
    image: nginx:latest
    container_name: front-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./logs/nginx:/var/log/nginx
    extra_hosts:
      - host.docker.internal:host-gateway
    depends_on:
      - api-gateway

  api-gateway:
    
    build:
      context: ../..
      dockerfile: build/image/Dockerfile
      args:
        SERVICE_PATH: services/api-gateway/cmd/gateway
        BINARY_NAME: gateway
    ports:
      - "8080:8080"
    container_name: api-gateway
    restart: always
    volumes:
      - ../../services/api-gateway/configs/gateway.yaml:/etc/vkino/gateway.yaml:ro
      - ./logs/app:/vkinoapi/logs/app
    command: ./gateway -config /etc/vkino/gateway.yaml
    depends_on:
      user-service:
        condition: service_started
      movie-service:
        condition: service_started

  auth-service:
    build:
      context: ../..
      dockerfile: build/image/Dockerfile
      args:
        SERVICE_PATH: services/auth-service/cmd/auth-service
        BINARY_NAME: auth-service
    container_name: auth-service
    restart: always
    volumes:
      - ../../services/auth-service/configs/auth.yaml:/etc/vkino/auth.yaml:ro
      - ./logs/app:/vkinoapi/logs/app
    command: ./auth-service -config /etc/vkino/auth.yaml
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    expose:
      - "8081"

  user-service:
    build:
      context: ../..
      dockerfile: build/image/Dockerfile
      args:
        SERVICE_PATH: services/user-service/cmd/user-service
        BINARY_NAME: user-service
    container_name: user-service
    restart: always
    volumes:
      - ../../services/user-service/configs/user.yaml:/etc/vkino/user.yaml:ro
      - ./logs/app:/vkinoapi/logs/app
    command: ./user-service -config /etc/vkino/user.yaml
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    expose:
      - "8082"

  movie-service:
    build:
      context: ../..
      dockerfile: build/image/Dockerfile
      args:
        SERVICE_PATH: services/movie-service/cmd/movie-service
        BINARY_NAME: movie-service
    container_name: movie-service
    restart: always
    volumes:
      - ../../services/movie-service/configs/movie.yaml:/etc/vkino/movie.yaml:ro
      - ./logs/app:/vkinoapi/logs/app
    command: ./movie-service -config /etc/vkino/movie.yaml
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    expose:
      - "8083"

  db:
    container_name: dev-postgres
    image: postgres:18.3
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    ports:
      - "5434:5432"
    volumes:
      - db-data:/var/lib/postgresql

  migrate:
    image: migrate/migrate
    volumes:
      - ../../migrations:/migrations
    command:
      [
        "-path",
        "/migrations",
        "-database",
        "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?sslmode=disable",
        "up"
      ]
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  minio:
    image: minio/minio:latest
    container_name: vkino-minio
    restart: always
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until /usr/bin/mc alias set local http://minio:9000 minioadmin minioadmin; do
        echo 'waiting for minio...';
        sleep 2;
      done;
      /usr/bin/mc mb -p local/vkino-actors || true;
      /usr/bin/mc mb -p local/vkino-posters || true;
      /usr/bin/mc mb -p local/vkino-cards || true;
      /usr/bin/mc mb -p local/vkino-avatars || true;
      /usr/bin/mc mb -p local/vkino-videos || true;
      /usr/bin/mc anonymous set none local/vkino-actors || true;
      /usr/bin/mc anonymous set none local/vkino-posters || true;
      /usr/bin/mc anonymous set none local/vkino-cards || true;
      /usr/bin/mc anonymous set none local/vkino-avatars || true;
      /usr/bin/mc anonymous set none local/vkino-videos || true;
      exit 0;
      "

volumes:
  db-data:
  minio_data:
