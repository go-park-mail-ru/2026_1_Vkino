services:
  nginx:
    image: nginx:latest
    container_name: front-nginx
    ports:
      - 80:80
      - 443:443
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./logs/nginx:/var/log/nginx
    restart: always
  vkinoapi:
    image: saucesamba/vkino-back:v0.1.1
    platform: linux/amd64
    command: ./vkinoapi --config=/usr/local/etc/config.yaml
    volumes:
      - ./vkinoapi/config.yaml:/usr/local/etc/config.yaml
    restart: always