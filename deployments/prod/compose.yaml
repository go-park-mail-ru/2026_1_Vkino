services:
  nginx:
    image: nginx:latest
    container_name: front-nginx
    ports:
      - 80:80
      - 443:443
    volumes:
      # nginx конфиг
      - ../nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro

      # фронт (dist) лежит внутри backend/deployments/prod/dist
      - ../prod/dist:/usr/share/nginx/html:ro

      - ./logs/nginx:/var/log/nginx
    restart: always