services:
  nginx:
    image: nginx:latest
    ports:
      - 80:80
      - 443:443
    restart: always
  vkinoapi:
    image: saucesamba/vkino-back:latest
    command: ./vkinoapi --config=/usr/local/etc/config.yaml
    volumes:
      - ./vkinoapi/config.yaml:/usr/local/etc/config.yaml
    restart: always