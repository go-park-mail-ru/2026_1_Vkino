services:
  nginx:
    image: nginx:latest
    container_name: vkino-nginx
    ports:
      - 80:80
      - 443:443
    volumes:
      # nginx конфиг
      - ../nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro

      # фронт (dist) лежит внутри backend/deployments/frontend/dist
      - ../frontend/dist:/usr/share/nginx/html:ro
    restart: always