services:
  nginx:
    image: nginx:latest
    container_name: front-nginx
    restart: always
    ports:
      - 80:80
      - 443:443
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./logs/nginx:/var/log/nginx
    extra_hosts:
      - host.docker.internal:host-gateway
    networks:
      - app-network 
    depends_on:
      - vkinoapi

  vkinoapi:
    image: alethandrina/vkino-back:v0.1.5
    platform: linux/amd64
    restart: always
    command: ./vkinoapi --config=/usr/local/etc/config.yaml
    volumes:
      - ./vkinoapi/config.yaml:/usr/local/etc/config.yaml
    working_dir: /vkinoapi 
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?sslmode=disable
    networks:
      - app-network  
    ports:
    - "127.0.0.1:8080:8080" 
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:latest
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - db-data:/var/lib/postgresql
    networks:
      - app-network 

networks:
  app-network:  

volumes:
  db-data: