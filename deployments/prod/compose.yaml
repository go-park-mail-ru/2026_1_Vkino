services:
  nginx:
    image: nginx:trixie-perl
    container_name: front-nginx
    restart: always
    ports:
      - 80:80
      - 443:443
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend-dist:/usr/share/nginx/html:ro
      - ./logs/nginx:/var/log/nginx
      - /etc/letsencrypt:/etc/letsencrypt:ro
    networks:
      - app-network

  api-gateway:
    image: saucesamba/vkino-gateway:v0.1.4
    platform: linux/amd64
    restart: always
    env_file:
      - ./.env
    command: ./gateway -config /etc/vkino/gateway.yaml
    volumes:
      - ./gateway/config.yaml:/etc/vkino/gateway.yaml:ro
      - ./logs/app:/vkinoapi/logs/app
    expose:
      - "9200"
    networks:
      - app-network

  auth-service:
    image: saucesamba/vkino-auth:v0.1.1
    platform: linux/amd64
    restart: always
    env_file:
      - ./.env
    command: ./auth -config /etc/vkino/auth.yaml
    volumes:
      - ./auth/config.yaml:/etc/vkino/auth.yaml:ro
      - ./logs/app:/vkinoapi/logs/app
    environment:
      AUTH_JWT_SECRET: ${AUTH_JWT_SECRET}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "9090"
      - "9201"
    networks:
      - app-network

  user-service:
    image: saucesamba/vkino-user:v0.1.4
    platform: linux/amd64
    restart: always
    env_file:
      - ./.env
    command: ./user -config /etc/vkino/user.yaml
    volumes:
      - ./user/config.yaml:/etc/vkino/user.yaml:ro
      - ./logs/app:/vkinoapi/logs/app
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "9091"
      - "9202"
    networks:
      - app-network

  movie-service:
    image: saucesamba/vkino-movie:v0.1.1
    platform: linux/amd64
    restart: always
    env_file:
      - ./.env
    command: ./movie -config /etc/vkino/movie.yaml
    volumes:
      - ./movie/config.yaml:/etc/vkino/movie.yaml:ro
      - ./logs/app:/vkinoapi/logs/app
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "9092"
      - "9203"
    networks:
      - app-network

  db:
    image: postgres:18.3
    env_file:
      - ./.env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - db-data:/var/lib/postgresql
    networks:
      - app-network

  migrate:
    image: migrate/migrate
    env_file:
      - ./.env
    volumes:
      - ../../migrations:/migrations
    command:
      [
        "-path",
        "/migrations",
        "-database",
        "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?sslmode=disable",
        "up"
      ]
    depends_on:
      db:
        condition: service_healthy
    restart: "no"
    networks:
      - app-network

  minio:
    image: minio/minio:latest
    container_name: vkino-minio
    restart: always
    env_file:
      - ./.env
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BROWSER_REDIRECT_URL: ${MINIO_BROWSER_REDIRECT_URL:-https://minio.vkino.tech}
      MINIO_SERVER_URL: ${MINIO_SERVER_URL:-https://media.vkino.tech}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - app-network

  minio-init:
    image: minio/mc:latest
    env_file:
      - ./.env
    depends_on:
      - minio
    volumes:
      - ../scripts/init-minio-buckets.sh:/scripts/init-minio-buckets.sh:ro
    entrypoint: ["/bin/sh", "/scripts/init-minio-buckets.sh"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    networks:
      - app-network

  prometheus:
    image: prom/prometheus:latest
    container_name: prod-prometheus-1
    restart: unless-stopped
    ports:
      - 9090:9090
    volumes:
      - ../monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      - api-gateway
      - auth-service
      - user-service
      - movie-service
      - node-exporter
      - cadvisor
    networks:
      - app-network

  grafana:
    image: grafana/grafana:latest
    container_name: prod-grafana-1
    restart: unless-stopped
    ports:
      - 3001:3000
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ../monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - app-network

  node-exporter:
    image: prom/node-exporter:latest
    container_name: prod-node-exporter-1
    command:
      - "--path.rootfs=/host"
    pid: host
    restart: unless-stopped
    volumes:
      - /:/host:ro,rslave
    expose:
      - "9100"
    networks:
      - app-network

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: prod-cadvisor-1
    privileged: true
    restart: unless-stopped
    devices:
      - /dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    expose:
      - "8080"
    networks:
      - app-network

networks:
  app-network:

volumes:
  db-data:
  minio_data:
  prometheus_data:
  grafana_data:
