services:
  nginx:
    image: nginx:trixie-perl
    container_name: front-nginx
    restart: always
    ports:
      - 80:80
      - 443:443
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend-dist:/usr/share/nginx/html:ro
      - ./logs/nginx:/var/log/nginx
      - /etc/letsencrypt:/etc/letsencrypt:ro
    networks:
      - app-network

  api-gateway:
    image: saucesamba/vkino-gateway:v0.1.1
    platform: linux/amd64
    restart: always
    command: ./gateway -config /etc/vkino/gateway.yaml
    volumes:
      - ./gateway/config.yaml:/etc/vkino/gateway.yaml:ro
      - ./logs/app:/vkinoapi/logs/app
    networks:
      - app-network

  auth-service:
    image: saucesamba/vkino-auth:v0.1.1
    platform: linux/amd64
    restart: always
    command: ./auth -config /etc/vkino/auth.yaml
    volumes:
      - ./auth/config.yaml:/etc/vkino/auth.yaml:ro
      - ./logs/app:/vkinoapi/logs/app
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network

  user-service:
    image: saucesamba/vkino-user:v0.1.1
    platform: linux/amd64
    restart: always
    command: ./user -config /etc/vkino/user.yaml
    volumes:
      - ./user/config.yaml:/etc/vkino/user.yaml:ro
      - ./logs/app:/vkinoapi/logs/app
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network

  movie-service:
    image: saucesamba/vkino-movie:v0.1.1
    platform: linux/amd64
    restart: always
    command: ./movie -config /etc/vkino/movie.yaml
    volumes:
      - ./movie/config.yaml:/etc/vkino/movie.yaml:ro
      - ./logs/app:/vkinoapi/logs/app
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network

  db:
    image: postgres:18.3
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - db-data:/var/lib/postgresql
    networks:
      - app-network

  migrate:
    image: migrate/migrate
    volumes:
      - ../../migrations:/migrations
    command:
      [
        "-path",
        "/migrations",
        "-database",
        "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?sslmode=disable",
        "up"
      ]
    depends_on:
      db:
        condition: service_healthy
    restart: "no"
    networks:
      - app-network

  minio:
    image: minio/minio:latest
    container_name: vkino-minio
    restart: always
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BROWSER_REDIRECT_URL: ${MINIO_BROWSER_REDIRECT_URL:-https://minio.vkino.tech}
      MINIO_SERVER_URL: ${MINIO_SERVER_URL:-https://media.vkino.tech}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - app-network

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until /usr/bin/mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD}; do
        echo 'waiting for minio...';
        sleep 2;
      done;
      /usr/bin/mc mb -p local/vkino-actors || true;
      /usr/bin/mc mb -p local/vkino-posters || true;
      /usr/bin/mc mb -p local/vkino-cards || true;
      /usr/bin/mc mb -p local/vkino-avatars || true;
      /usr/bin/mc mb -p local/vkino-videos || true;
      /usr/bin/mc anonymous set none local/vkino-actors || true;
      /usr/bin/mc anonymous set none local/vkino-posters || true;
      /usr/bin/mc anonymous set none local/vkino-cards || true;
      /usr/bin/mc anonymous set none local/vkino-avatars || true;
      /usr/bin/mc anonymous set none local/vkino-videos || true;
      exit 0;
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    networks:
      - app-network

networks:
  app-network:

volumes:
  db-data:
  minio_data:
