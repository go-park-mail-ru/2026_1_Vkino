server:
  port: 8080
  timeouts:
    read_header: "5s"
    read: "10s"
    write: "15s"
    idle: "60s"
  cors:
    
auth:
  jwt_secret: "dev-secret"
  access_token_ttl: "15m"
  refresh_token_ttl: "336h"         # 14 дней
  refresh_cookie_name: "refresh_token"
  cookie_secure: false              # для localhost false

s3:
  internal_endpoint: "minio:9000"
  public_endpoint: "vkino.tech:9000"
  region: "us-east-1"
  access_key_id: "minioadmin"
  secret_access_key: "minioadmin"
  bucket_images: "vkino-images"
  bucket_avatars: "vkino-avatars"
  bucket_videos: "vkino-videos"
  use_ssl: false
  use_path_style: true
  presign_ttl: "15m"

postgres:
  host: "db"                    
  port: 5432
  user: "vkino_user"            
  password: "vkino"            
  dbname: "vkino"              
  sslmode: "disable"
  max_pool_size: 25
  conn_attempts: 10
  conn_timeout: "5s"
  
cors:
  allowed_origins:
    - "http://vkino.tech"
    - "http://www.vkino.tech"
  allowed_methods:
    - GET
    - POST
    - PUT
    - DELETE
    - PATCH
    - OPTIONS
  allowed_headers:
    - Content-Type
    - Authorization
  allow_credentials: true
  max_age: 3600
