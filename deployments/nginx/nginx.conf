server {
    listen 80;
    server_name vkino.tech www.vkino.tech;

    charset utf-8;
    client_max_body_size 20m;

    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    # -------------------------
    # API -> Go backend
    # -------------------------
    # ВАЖНО:
    #   /api/xxx  ->  http://api:8080/xxx
    # То есть префикс /api/ отрезается.
    location /api/ {
        proxy_pass http://api:8080/;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # -------------------------
    # Frontend (SPA dist)
    # -------------------------
    root /usr/share/nginx/html;
    index index.html;

    # Кеш для ассетов сборки
    location ~* \.(?:css|js|jpg|jpeg|gif|png|svg|ico|webp|ttf|otf|woff|woff2)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
        access_log off;
    }

    # SPA fallback (Vue/React router history)
    location / {
        try_files $uri $uri/ /index.html;
    }
}