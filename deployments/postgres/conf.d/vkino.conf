# VKino PostgreSQL project config
#
# Настройки подобраны под микросервисное приложение онлайн-кинотеатра:
# auth-service, user-service, movie-service, api-gateway.


# ----------------------------------------------------------------------------
# Network / connections
# ----------------------------------------------------------------------------

listen_addresses = '*'

max_connections = 100

password_encryption = 'scram-sha-256'


# ----------------------------------------------------------------------------
# Memory
# ----------------------------------------------------------------------------

shared_buffers = '768MB'
effective_cache_size = '2560MB'
work_mem = '4MB'
maintenance_work_mem = '256MB'


# ----------------------------------------------------------------------------
# Durability / WAL
# ----------------------------------------------------------------------------

synchronous_commit = on
wal_writer_delay = '200ms'


# ----------------------------------------------------------------------------
# Extensions / preload libraries
#
# pg_stat_statements требует shared_preload_libraries.
# auto_explain тоже удобнее включать через shared_preload_libraries.
# ----------------------------------------------------------------------------

shared_preload_libraries = 'pg_stat_statements,auto_explain'

pg_stat_statements.max = 10000
pg_stat_statements.track = all
pg_stat_statements.save = on

track_io_timing = on

statement_timeout = '5s'
lock_timeout = '1s'
idle_in_transaction_session_timeout = '10s'


# ----------------------------------------------------------------------------
# Slow queries logging for PGBadger
#
# PGBadger читает csvlog.
# ----------------------------------------------------------------------------

logging_collector = on
log_destination = 'csvlog'

log_directory = '/var/log/postgresql'
log_filename = 'postgresql-%Y-%m-%d_%H%M%S'
log_file_mode = 0640

log_rotation_age = '1d'
log_rotation_size = '100MB'
log_truncate_on_rotation = off

log_min_duration_statement = '300ms'

log_min_error_statement = error
log_error_verbosity = default

log_connections = on
log_disconnections = on

log_lock_waits = on
deadlock_timeout = '1s'

log_checkpoints = on
log_temp_files = '10MB'


# ----------------------------------------------------------------------------
# Log prefix
#
# application_name задаётся приложением через pgx.
# ----------------------------------------------------------------------------

log_line_prefix = '%m [%p] user=%u,db=%d,app=%a,client=%h '


# ----------------------------------------------------------------------------
# auto_explain
#
# auto_explain логирует планы медленных запросов.
# Порог выше, чем log_min_duration_statement, чтобы не засорять лог планами
# каждого небольшого запроса.
# ----------------------------------------------------------------------------

auto_explain.log_min_duration = '500ms'
auto_explain.log_analyze = on
auto_explain.log_buffers = on
auto_explain.log_wal = on
auto_explain.log_timing = off
auto_explain.log_nested_statements = on
auto_explain.log_format = 'json'
