# VKino PostgreSQL host-based authentication
#
# This file controls authentication inside the private Docker Compose network.
# If POSTGRES_ADMIN_USER/POSTGRES_USER changes from `vkino_user`, update the
# explicit admin line below accordingly.

local   all      all                    scram-sha-256

host    vkino    vkino_user             172.16.0.0/12   scram-sha-256

host    vkino    vkino_auth_service     172.16.0.0/12   scram-sha-256
host    vkino    vkino_user_service     172.16.0.0/12   scram-sha-256
host    vkino    vkino_movie_service    172.16.0.0/12   scram-sha-256
host    vkino    vkino_migrator         172.16.0.0/12   scram-sha-256
host    vkino    vkino_monitoring       172.16.0.0/12   scram-sha-256

host    all      all                    0.0.0.0/0       reject
host    all      all                    ::/0            reject
