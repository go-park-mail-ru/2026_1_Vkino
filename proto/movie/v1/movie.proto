syntax = "proto3";

package movie.v1;

option go_package = "github.com/go-park-mail-ru/2026_1_VKino/pkg/gen/movie/v1;moviev1";

service MovieService {
  rpc GetMovieByID(GetMovieByIDRequest) returns (GetMovieByIDResponse);
  rpc GetMoviesByIDs(GetMoviesByIDsRequest) returns (GetMoviesByIDsResponse);
  rpc GetActorByID(GetActorByIDRequest) returns (GetActorByIDResponse);
  rpc GetGenreByID(GetGenreByIDRequest) returns (GetGenreByIDResponse);
  rpc GetAllGenres(GetAllGenresRequest) returns (GetAllGenresResponse);
  rpc GetSelectionByTitle(GetSelectionByTitleRequest) returns (GetSelectionByTitleResponse);
  rpc GetAllSelections(GetAllSelectionsRequest) returns (GetAllSelectionsResponse);

  rpc SearchMovies(SearchMoviesRequest) returns (SearchMoviesResponse);
  rpc GetEpisodePlayback(GetEpisodePlaybackRequest) returns (GetEpisodePlaybackResponse);
  rpc GetEpisodeProgress(GetEpisodeProgressRequest) returns (GetEpisodeProgressResponse);
  rpc SaveEpisodeProgress(SaveEpisodeProgressRequest) returns (SaveEpisodeProgressResponse);
  rpc GetContinueWatching(GetContinueWatchingRequest) returns (GetContinueWatchingResponse);
  rpc GetWatchHistory(GetWatchHistoryRequest) returns (GetWatchHistoryResponse);
}

message GetMovieByIDRequest {
  int64 movie_id = 1;
}

message ActorShort {
  int64 id = 1;
  string full_name = 2;
  string img_url = 3;
}

message EpisodeShort {
  int64 id = 1;
  int64 movie_id = 2;
  int32 season_number = 3;
  int32 episode_number = 4;
  string title = 5;
  string description = 6;
  int32 duration_seconds = 7;
  string img_url = 8;
}

message GetMovieByIDResponse {
  int64 id = 1;
  string title = 2;
  string description = 3;
  string director = 4;
  string trailer_url = 5;
  string content_type = 6;
  int32 release_year = 7;
  int32 duration_seconds = 8;
  int32 age_limit = 9;
  int64 original_language_id = 10;
  string original_language = 11;
  int64 country_id = 12;
  string country = 13;
  string img_url = 14;
  string poster_url = 15;
  repeated string genres = 16;
  repeated ActorShort actors = 17;
  repeated EpisodeShort episodes = 18;
  bool is_favorite = 19;
}

message GetMoviesByIDsRequest {
  repeated int64 movie_ids = 1;
}

message GetMoviesByIDsResponse {
  repeated MovieCard movies = 1;
}

message GetActorByIDRequest {
  int64 actor_id = 1;
}

message MovieCard {
  int64 id = 1;
  string title = 2;
  string img_url = 3;
}

message GetActorByIDResponse {
  int64 id = 1;
  string full_name = 2;
  string biography = 3;
  string birthdate = 4;
  int64 country_id = 5;
  string img_url = 6;
  repeated MovieCard movies = 7;
}

message GetGenreByIDRequest {
  int64 genre_id = 1;
}

message GetGenreByIDResponse {
  int64 id = 1;
  string title = 2;
  repeated MovieCard movies = 3;
}

message GenreShort {
  int64 id = 1;
  string title = 2;
}

message GetAllGenresRequest {}

message GetAllGenresResponse {
  repeated GenreShort genres = 1;
}

message GetSelectionByTitleRequest {
  string title = 1;
}

message Selection {
  string title = 1;
  repeated MovieCard movies = 2;
}

message GetSelectionByTitleResponse {
  string title = 1;
  repeated MovieCard movies = 2;
}

message GetAllSelectionsRequest {}

message GetAllSelectionsResponse {
  repeated Selection selections = 1;
}

message SearchMoviesRequest {
  string query = 1;
}

message SearchMoviesResponse {
  repeated MovieCard movies = 1;
}

message GetEpisodePlaybackRequest {
  int64 episode_id = 1;
}

message GetEpisodePlaybackResponse {
  int64 episode_id = 1;
  int64 movie_id = 2;
  int32 season_number = 3;
  int32 episode_number = 4;
  string title = 5;
  int32 duration_seconds = 6;
  string playback_url = 7;
}

message GetEpisodeProgressRequest {
  int64 user_id = 1;
  int64 episode_id = 2;
}

message GetEpisodeProgressResponse {
  int64 episode_id = 1;
  int64 position_seconds = 2;
}

message SaveEpisodeProgressRequest {
  int64 user_id = 1;
  int64 episode_id = 2;
  int64 position_seconds = 3;
}

message SaveEpisodeProgressResponse {
  int64 episode_id = 1;
  int64 position_seconds = 2;
}

message WatchProgressItem {
  int64 movie_id = 1;
  string movie_title = 2;
  string poster_url = 3;
  string content_type = 4;
  int32 season_number = 5;
  int32 episode_number = 6;
  string episode_title = 7;
  int64 position_seconds = 8;
  int64 duration_seconds = 9;
  string updated_at = 10;
  int64 episode_id = 11;
}

message GetContinueWatchingRequest {
  int32 limit = 1;
}

message GetContinueWatchingResponse {
  repeated WatchProgressItem items = 1;
}

message GetWatchHistoryRequest {
  int32 limit = 1;
  double min_progress = 2;
}

message GetWatchHistoryResponse {
  repeated WatchProgressItem items = 1;
}
