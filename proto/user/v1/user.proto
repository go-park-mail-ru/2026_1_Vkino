syntax = "proto3";

package user.v1;

option go_package = "github.com/go-park-mail-ru/2026_1_VKino/pkg/gen/user/v1;userv1";
import "movie/v1/movie.proto";

service UserService {
  rpc GetProfile(GetProfileRequest) returns (GetProfileResponse);
  rpc UpdateProfile(UpdateProfileRequest) returns (UpdateProfileResponse);
  rpc SearchUsersByEmail(SearchUsersByEmailRequest) returns (SearchUsersByEmailResponse);
  rpc AddFriend(AddFriendRequest) returns (AddFriendResponse);
  rpc DeleteFriend(DeleteFriendRequest) returns (DeleteFriendResponse);
  rpc AddMovieToFavorites(AddMovieToFavoritesRequest) returns (AddMovieToFavoritesResponse);
  rpc ToggleFavorite(ToggleFavoriteRequest) returns (ToggleFavoriteResponse);
  rpc GetFavorites(GetFavoritesRequest) returns (GetFavoritesResponse);
  rpc SearchUsers(SearchUsersRequest) returns (SearchUsersResponse);
  rpc SendFriendRequest(SendFriendRequestRequest) returns (SendFriendRequestResponse);
  rpc RespondToFriendRequest(RespondToFriendRequestRequest) returns (RespondToFriendRequestResponse);
  rpc DeleteOutgoingFriendRequest(DeleteOutgoingFriendRequestRequest) returns (DeleteOutgoingFriendRequestResponse);
  rpc GetFriendRequests(GetFriendRequestsRequest) returns (GetFriendRequestsResponse);
  rpc GetFriendsList(GetFriendsListRequest) returns (GetFriendsListResponse);
}

message GetProfileRequest {
  int64 user_id = 1;
}

message GetProfileResponse {
  string email = 1;
  string birthdate = 2;
  string avatar_url = 3;
  string role = 4;
}

message UpdateProfileRequest {
  int64 user_id = 1;
  string birthdate = 2;
  bytes avatar = 3;
  string avatar_content_type = 4;
}

message UpdateProfileResponse {
  string email = 1;
  string birthdate = 2;
  string avatar_url = 3;
}

message SearchUsersByEmailRequest {
  int64 user_id = 1;
  string email_query = 2;
}

message UserSearchResult {
  int64 id = 1;
  string email = 2;
  bool is_friend = 3;
}

message SearchUsersByEmailResponse {
  repeated UserSearchResult users = 1;
}

message AddFriendRequest {
  int64 user_id = 1;
  int64 friend_id = 2;
}

message AddFriendResponse {
  int64 id = 1;
  string email = 2;
}

message DeleteFriendRequest {
  int64 user_id = 1;
  int64 friend_id = 2;
}

message DeleteFriendResponse {
  bool success = 1;
}

message AddMovieToFavoritesRequest {
  int64 user_id = 1;
  int64 movie_id = 2;
}

message AddMovieToFavoritesResponse {
  int64 movie_id = 1;
  bool is_favorite = 2;
}

message ToggleFavoriteRequest {
  int64 movie_id = 1;
}

message ToggleFavoriteResponse {
  int64 movie_id = 1;
  bool is_favorite = 2;
}

message GetFavoritesRequest {
  int32 limit = 1;
  int32 offset = 2;
}

message GetFavoritesResponse {
  repeated movie.v1.MovieCard movies = 1;
  int32 total_count = 2;
}

message SearchUsersRequest {
  string query = 1;
  int32 limit = 2;
}

message SearchUsersResponse {
  repeated UserSearchResult users = 1;
}

message SendFriendRequestRequest {
  int64 to_user_id = 1;
}

message SendFriendRequestResponse {
  int64 request_id = 1;
}

message RespondToFriendRequestRequest {
  int64 request_id = 1;
  string action = 2;
}

message RespondToFriendRequestResponse {
  bool success = 1;
}

message DeleteOutgoingFriendRequestRequest {
  int64 request_id = 1;
}

message DeleteOutgoingFriendRequestResponse {
  bool success = 1;
}

message GetFriendRequestsRequest {
  string direction = 1;
  int32 limit = 2;
}

message FriendRequestItem {
  int64 id = 1;
  int64 user_id = 2;
  string email = 3;
  string created_at = 4;
}

message GetFriendRequestsResponse {
  repeated FriendRequestItem requests = 1;
}

message GetFriendsListRequest {
  int32 limit = 1;
  int32 offset = 2;
}

message GetFriendsListResponse {
  repeated UserSearchResult friends = 1;
  int32 total_count = 2;
}
