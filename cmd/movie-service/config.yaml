grpc:
  port: 9092

auth_grpc:
  address: "auth:9090"
  request_timeout: "5s"

logger:
  level: "info"
  format: "json"
  output_path: "logs/app/movie-service.log"

postgres:
  host: "db"
  port: 5432
  user: ""
  password: ""
  dbname: ""
  sslmode: "disable"
  max_pool_size: 10
  conn_attempts: 10
  conn_timeout: "5s"

s3:
  internal_endpoint: "minio:9000"
  public_endpoint: "localhost:9000"
  region: "ru-msk"
  access_key_id: ""
  secret_access_key: ""
  bucket_actors: "vkino-actors"
  bucket_posters: "vkino-posters"
  bucket_cards: "vkino-cards"
  bucket_videos: "vkino-videos"
  use_ssl: false
  use_path_style: true
  presign_ttl: "15m"
